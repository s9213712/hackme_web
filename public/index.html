<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hackme_web — 登入系統</title>
  <!-- Content Security Policy — strict, no inline scripts -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f1a;
      --surface:  #1a1a2e;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --danger:   #ff4f6d;
      --text:     #e0e0f0;
      --muted:    #8888aa;
      --radius:   12px;
      --shadow:   0 8px 32px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    .clock {
      position: fixed;
      left: 16px;
      top: 16px;
      font-size: .88rem;
      color: var(--muted);
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      padding: .45rem .7rem;
      z-index: 9;
      min-width: 170px;
      text-align: center;
      letter-spacing: .02em;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      width: min(420px, 90vw);
      border: 1px solid rgba(255,255,255,.06);
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: .2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 1.8rem;
    }

    /* ── Tabs ─────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,.35);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: .55rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      transition: background .2s, color .2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Form ─────────────────────────────────────────────── */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    input {
      width: 100%;
      padding: .65rem .9rem;
      background: rgba(0,0,0,.3);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--accent); }

    /* ── Password field with toggle ──────────────────────── */
    .pw-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .pw-wrap input {
      padding-right: 2.8rem;
    }

    .pw-toggle {
      position: absolute;
      right: .6rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: .2rem;
      color: var(--muted);
      transition: color .2s;
      user-select: none;
      line-height: 1;
    }

    .pw-toggle:hover { color: var(--accent); }

    .pw-rules {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .4rem;
      line-height: 1.5;
    }

    .pw-rules span { color: var(--accent2); }

    /* ── Button ───────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: .75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8a80ff);
      color: #fff;
    }

    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.97); }

    /* ── Message ───────────────────────────────────────────── */
    .msg {
      margin-top: .9rem;
      padding: .65rem .85rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .msg.show { display: block; }
    .msg.ok   { background: rgba(0,212,170,.18); color: var(--accent2); border: 1px solid rgba(0,212,170,.35); }
    .msg.err  { background: rgba(255,79,109,.18); color: var(--danger); border: 1px solid rgba(255,79,109,.35); }

    .info-grid {
      display: grid;
      gap: .45rem;
      grid-template-columns: 1fr;
      margin: 1rem 0;
      text-align: left;
      font-size: .9rem;
      color: var(--muted);
    }

    .admin-wrap {
      display: none;
      width: min(860px, 94vw);
      margin-top: .8rem;
    }

    .admin-wrap.show { display: block; }

    .admin-tools {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.06);
      padding: 1rem;
      box-shadow: var(--shadow);
      margin-top: .9rem;
    }

    .admin-toolbar {
      display: grid;
      gap: .55rem;
      grid-template-columns: repeat(2, 1fr);
      margin-bottom: .75rem;
    }

    .admin-toolbar .btn { width: 100%; }

    .mini-title {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: .45rem;
    }

    .user-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: .7rem;
      font-size: .82rem;
    }

    .user-table th,
    .user-table td {
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: .45rem .45rem;
      text-align: left;
      vertical-align: top;
    }

    .user-table th {
      color: var(--accent2);
      font-weight: 600;
      font-size: .74rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .user-table tr:last-child td { border-bottom: none; }

    .action {
      display: inline-flex;
      gap: .4rem;
      margin-top: .45rem;
      flex-wrap: wrap;
    }

    .action .btn {
      width: auto;
      padding: .45rem .7rem;
      font-size: .76rem;
      font-weight: 600;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    /* ── Success screen ───────────────────────────────────── */
    #success-screen {
      display: none;
      text-align: center;
    }

    #success-screen.show { display: block; }

    .success-icon {
      font-size: 4rem;
      margin-bottom: .5rem;
    }

    #success-screen h2 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--accent2), #7fffb2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #logout-btn {
      margin-top: 1.5rem;
      background: rgba(255,255,255,.08);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.1);
      font-size: .85rem;
    }

    #logout-btn:hover { background: rgba(255,255,255,.14); color: var(--text); }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      margin-top: 1.2rem;
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── Spinner ──────────────────────────────────────────── */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: .6rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading { opacity: .7; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="clock" id="clock">⏰ 載入時間中...</div>

<!-- ════════════════════ AUTH CARD ════════════════════ -->
<div class="card" id="auth-card">

  <h1>Help me improve, hack me please.</h1>
  <p class="subtitle">簡單的帳號註冊與登入系統</p>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login"  onclick="showTab('login')">登入</button>
    <button class="tab"        id="tab-register" onclick="showTab('register')">註冊</button>
  </div>

  <!-- ── Login form ─────────────────────────────────── -->
  <div class="form-section active" id="sec-login">
    <div class="field">
      <label>帳號</label>
      <input type="text" id="li-user" placeholder="請輸入帳號" autocomplete="username" />

    <div class="field">

      <div class="pw-wrap">
        <input type="password" id="li-pw" placeholder="請輸入密碼" autocomplete="current-password" />
        <button class="pw-toggle" id="li-pw-toggle" type="button" aria-label="顯示密碼">👁</button>

  <!-- ── Register form ───────────────────────────────── -->
  <div class="form-section" id="sec-register">

      <input type="text" id="reg-user" placeholder="選擇一個帳號（3 字以上）" autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼</label>
      <div class="pw-wrap">
        <input type="password" id="reg-pw" placeholder="請設定密碼" autocomplete="new-password" />
        <button class="pw-toggle" id="reg-pw-toggle" type="button" aria-label="顯示密碼">👁</button>
      </div>

        密碼強度要求：<br>

        <span>✓</span> 包含大寫字母（A–Z）<br>
        <span>✓</span> 包含小寫字母（a–z）<br>
        <span>✓</span> 包含符號（!@#$%…）<p style="margin-top:.4rem; color:#ff4f6d" id="reg-pw-hint"></p>
      </div>
    </div>
    <div class="field">
      <label>暱稱</label>
      <input type="text" id="reg-nickname" placeholder="暱稱" autocomplete="nickname" />

    <div class="field">
      <label>真實姓名</label>
      <input type="text" id="reg-realname" placeholder="請輸入真實姓名" autocomplete="off" />
    </div>

      <label>身分證</label>

    </div>
    <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">註冊</button>
    <div class="spinner" id="reg-spinner"></div>
    <div class="msg" id="reg-msg"></div>
  </div>

</div><!-- /auth-card -->

<div id="success-screen">
  <div class="success-icon">🎉</div>
  <h2>恭喜登入成功</h2>
  <p style="color:var(--muted); margin-top:.5rem">歡迎回來！</p>
  <div class="info-grid">
    <div>使用者：<span id="me-user">-</span></div>

  <div class="admin-wrap" id="admin-wrap">

      <div class="admin-toolbar">

    <div class="admin-tools" style="margin-top:.9rem;" id="admin-manager-view">

      <p id="manager-help" style="font-size:.78rem; color:var(--muted); margin-bottom:.6rem;">僅最高權限可修改與刪除；管理者可封鎖與解除封鎖。</p>
      <form id="admin-add-form">

          <input type="text" id="admin-add-realname" placeholder="真實姓名" />

</div>

<div class="footer">hackme_web · 密碼使用 Argon2id 雜湊儲存</div>

<!-- ════════════════════ LOGIC ════════════════════ -->
<script>
(function() {
'use strict';

const API = "/api";
let _csrfToken = null;
let currentUser = null;
let currentRole = "user";
let canManageUsers = false;
let users = [];

function $(id) { return document.getElementById(id); }

// ── Sanitization (XSS defense — defense in depth) ────────────
function sanitize(str) {
  if (typeof str !== 'string') return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;')
    .replace(/\//g, '&#x2F;');
}

function readCookie(name) {
  const cookie = document.cookie || "";
  const prefix = `${name}=`;
  const item = cookie.split('; ').find((v) => v.startsWith(prefix));
  return item ? decodeURIComponent(item.substring(prefix.length)) : "";
}

function getCsrfToken() { return _csrfToken; }

async function fetchCsrfToken({ force = false } = {}) {
  if (!force) {
    const cookieToken = readCookie("csrf_token");
    if (cookieToken) {
      _csrfToken = cookieToken;
      return;
    }
  }

  try {
    const res = await fetch(API + '/csrf-token', { credentials: 'same-origin' });
    const json = await res.json();
    if (json.ok) _csrfToken = json.csrf_token;
    else _csrfToken = null;
  } catch (_) { _csrfToken = null; }
}

function flash(el, text, ok) {
  if (!el) return;
  el.textContent = text;
  el.className = "msg show " + (ok ? "ok" : "err");
}

function clearMsg() {
  $("li-msg").className = "msg";
  $("reg-msg").className = "msg";
}

function setLoading(btnId, spinnerId, on) {
  const btn = $(btnId);
  const sp  = $(spinnerId);
  if (!btn || !sp) return;
  btn.classList.toggle("loading", on);
  sp.style.display = on ? "block" : "none";
}

function showTab(tab) {
  $("sec-login").classList.toggle("active",    tab === "login");
  $("sec-register").classList.toggle("active", tab === "register");
  $("tab-login").classList.toggle("active",    tab === "login");
  $("tab-register").classList.toggle("active",tab === "register");
  clearMsg();
}

function setupPwToggle(inputId, btnId) {
  const input = $(inputId);
  const btn   = $(btnId);
  if (!input || !btn) return;
  btn.addEventListener("mousedown", () => {
    input.type = "text";
    btn.textContent = "🙈";
  });
  btn.addEventListener("mouseup", () => {
    input.type = "password";
    btn.textContent = "👁";
  });
  btn.addEventListener("mouseleave", () => {
    input.type = "password";
    btn.textContent = "👁";
  });
  btn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    input.type = "text";
    btn.textContent = "🙈";
  }, { passive: false });
  btn.addEventListener("touchend", (e) => {
    e.preventDefault();
    input.type = "password";
    btn.textContent = "👁";
  }, { passive: false });
}

function pad2(v) { return String(v).padStart(2, "0"); }
function startClock() {
  const clock = $("clock");
  if (!clock) return;
  const tick = () => {
    const now = new Date();
    clock.textContent = `⏰ ${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())} ${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
  };
  tick();
  setInterval(tick, 1000);
}

setupPwToggle("li-pw", "li-pw-toggle");
setupPwToggle("reg-pw", "reg-pw-toggle");

$("reg-pw").addEventListener("input", function () {
  const v = this.value;
  const hints = [];
  if (v.length < 8)                      hints.push("至少 8 字");
  if (!/[A-Z]/.test(v))                 hints.push("需大寫");
  if (!/[a-z]/.test(v))                 hints.push("需小寫");
  if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(v)) hints.push("需符號");
  $("reg-pw-hint").textContent = hints.length ? "❌ " + hints.join(" · ") : "✓ 符合強度要求";
});

function setAuthState(json) {
  currentUser = json.username || null;
  currentRole = json.role || "user";
  canManageUsers = currentRole === "super_admin";
  $("auth-card").style.display = "none";
  $("success-screen").classList.add("show");
  $("me-user").textContent = sanitize(currentUser || "-");
  $("me-role").textContent = sanitize(json.role_label || currentRole || "-");
  $("me-nickname").textContent = sanitize(json.nickname || "-");
  const adminWrap = $("admin-wrap");
  if (adminWrap) {
    if (currentRole === "manager" || currentRole === "super_admin") {
      adminWrap.classList.add("show");
    } else {
      adminWrap.classList.remove("show");
    }
  }
  const addPanel = $("admin-manager-view");
  if (addPanel) addPanel.style.display = canManageUsers ? "block" : "none";
  if (currentRole === "manager" || currentRole === "super_admin") {
    loadUsers();
  }
}

function resetAuthState() {
  currentUser = null;
  currentRole = "user";
  canManageUsers = false;
  users = [];
  $("success-screen").classList.remove("show");
  $("admin-wrap").className = "admin-wrap";
  $("me-user").textContent = "-";
  $("me-role").textContent = "-";
  $("me-nickname").textContent = "-";
  $("auth-card").style.display = "";
  const tb = $("user-table")?.querySelector("tbody");
  if (tb) tb.innerHTML = "";
}

function renderUsers() {
  const tbody = $("user-table")?.querySelector("tbody");
  if (!tbody) return;
  tbody.innerHTML = "";
  for (const u of users) {
    const blocked = u.blocked_until && new Date(u.blocked_until) > new Date();
    const actionButtons = [];
    if (currentRole === "manager" || currentRole === "super_admin") {
      if (u.role !== "super_admin") {
        actionButtons.push(`<button class="btn btn-primary" onclick="toggleBlock(${u.id}, ${blocked ? "true" : "false"})">${blocked ? "解除封鎖" : "封鎖 30 分鐘"}</button>`);
      }
    }
    if (canManageUsers && u.username !== "root") {
      actionButtons.push(`<button class="btn btn-danger" onclick="removeUser(${u.id})">刪除</button>`);
      actionButtons.push(`<button class="btn btn-primary" onclick="editUser(${u.id})">修改資料</button>`);
    }
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${u.id}</td>
      <td>${sanitize(u.username || "")}</td>
      <td>${sanitize(u.nickname || "")}</td>
      <td>${sanitize(u.real_name || "")}</td>
      <td>${sanitize(u.role || "")}</td>
      <td>${sanitize(u.status || "")}</td>
      <td><div class="action">${actionButtons.join("")}</div></td>
    `;
    tbody.appendChild(tr);
  }
}

async function loadUsers() {
  if (!currentUser) return;
  if (!["manager","super_admin"].includes(currentRole)) return;
  await fetchCsrfToken({ force: true });
  const csrf = getCsrfToken();
  try {
    const res = await fetch(API + "/admin/users", {
      credentials: "same-origin",
      headers: { "X-CSRF-Token": csrf || "" }
    });
    const json = await res.json();
    if (!json.ok) return;
    users = Array.isArray(json.users) ? json.users : [];
    canManageUsers = !!json.can_manage;
    renderUsers();
  } catch (_) {}
}

async function doLogin() {
  const user = sanitize($("li-user").value.trim());
  const pw   = $("li-pw").value;
  if (!user || !pw) { flash($("li-msg"), "請填寫帳號與密碼", false); return; }

  await fetchCsrfToken({ force: false });
  const csrf = getCsrfToken();
  if (!csrf) {
    flash($("li-msg"), "無法取得 CSRF token，請重新整理頁面", false);
    return;
  }
  setLoading("li-btn", "li-spinner", true);
  clearMsg();

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRF-Token": csrf || ""
      },
      body: JSON.stringify({ username: user, password: pw, csrf_token: csrf })
    });
    const json = await res.json();
    if (!json.ok) {
      _csrfToken = null;
      flash($("li-msg"), json.msg || "登入失敗", false);
      return;
    }
    _csrfToken = null;
    const meRes = await fetch(API + "/me", { credentials: "same-origin" });
    const me = await meRes.json();
    if (me.ok) setAuthState(me);
    else setAuthState({ username: user, role: "user", role_label: "一般用戶", nickname: "-" });
  } catch (e) {
    flash($("li-msg"), "網路錯誤，請稍後再試", false);
  } finally {
    setLoading("li-btn", "li-spinner", false);
  }
}

async function doRegister() {
  const user = $("reg-user").value.trim();
  const pw   = $("reg-pw").value;
  const nickname = $("reg-nickname").value.trim();
  const realName = $("reg-realname").value.trim();
  const idNo = $("reg-idno").value.trim();
  const birth = $("reg-birthdate").value;
  const phone = $("reg-phone").value.trim();

  if (!user) { flash($("reg-msg"), "請填寫帳號", false); return; }
  if (user.length < 3) { flash($("reg-msg"), "帳號至少 3 字元", false); return; }
  if (!nickname) { flash($("reg-msg"), "暱稱不可為空", false); return; }
  if (!realName) { flash($("reg-msg"), "真實姓名不可為空", false); return; }
  if (!idNo) { flash($("reg-msg"), "身分證不可為空", false); return; }
  if (!birth) { flash($("reg-msg"), "請填寫生日", false); return; }
  if (!phone) { flash($("reg-msg"), "請填寫電話", false); return; }

  if (!/^[a-zA-Z0-9_\-]+$/.test(user)) {
    flash($("reg-msg"), "帳號只能包含英文、數字、底線、減號", false);
    return;
  }

  await fetchCsrfToken({ force: false });
  const csrf = getCsrfToken();
  if (!csrf) {
    flash($("reg-msg"), "無法取得 CSRF token，請重新整理頁面", false);
    setLoading("reg-btn", "reg-spinner", false);
    return;
  }
  setLoading("reg-btn", "reg-spinner", true);
  clearMsg();

  try {
    const res = await fetch(API + "/register", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json", "X-CSRF-Token": csrf || "" },
      body: JSON.stringify({
        username: user,
        password: pw,
        nickname,
        real_name: realName,
        id_number: idNo,
        birthdate: birth,
        phone,
        csrf_token: csrf
      })
    });
    const json = await res.json();
    if (json.ok) {
      _csrfToken = null;
      flash($("reg-msg"), "✓ " + sanitize(json.msg), true);
      setTimeout(() => { $("reg-pw").value = ""; $("reg-pw-hint").textContent = ""; }, 1500);
      setTimeout(() => showTab("login"), 2000);
    } else {
      _csrfToken = null;
      flash($("reg-msg"), json.msg || "註冊失敗", false);
    }
  } catch (e) {
    flash($("reg-msg"), "網路錯誤，請稍後再試", false);
  } finally {
    setLoading("reg-btn", "reg-spinner", false);
  }
}

async function doLogout() {
  try {
    await fetch(API + "/logout", {
      method: "POST",
      credentials: "same-origin",
      headers: { "X-CSRF-Token": getCsrfToken() || "" }
    });
  } catch (_) {}
  _csrfToken = null;
  resetAuthState();
}

async function toggleBlock(userId, isBlocked) {
  if (!currentUser) return;
  await fetchCsrfToken({ force: true });
  const csrf = getCsrfToken();
  const body = isBlocked ? { action: "unblock" } : { action: "block", minutes: 30 };
  const res = await fetch(API + `/admin/users/${userId}/block`, {
    method: "POST",
    credentials: "same-origin",
    headers: { "Content-Type": "application/json", "X-CSRF-Token": csrf || "" },
    body: JSON.stringify(body)
  });
  const json = await res.json().catch(() => ({}));
  if (json && json.ok) {
    loadUsers();
  } else {
    flash($("li-msg"), json.msg || "操作失敗", false);
  }
}

async function editUser(userId) {
  const target = users.find((u) => String(u.id) === String(userId));
  if (!target) return;
  const nickname = window.prompt("修改暱稱", target.nickname || "");
  if (nickname === null) return;
  const realName = window.prompt("修改真實姓名", target.real_name || "");
  if (realName === null) return;
  const phone = window.prompt("修改電話", target.phone || "");
  if (phone === null) return;

  await fetchCsrfToken({ force: true });
  const csrf = getCsrfToken();
  const res = await fetch(API + `/admin/users/${userId}`, {
    method: "PUT",
    credentials: "same-origin",
    headers: { "Content-Type": "application/json", "X-CSRF-Token": csrf || "" },
    body: JSON.stringify({
      nickname: nickname.trim(),
      real_name: realName.trim(),
      phone: phone.trim()
    })
  });
  const json = await res.json().catch(() => ({}));
  if (json && json.ok) {
    loadUsers();
  } else {
    flash($("li-msg"), json.msg || "修改失敗", false);
  }
}

async function removeUser(userId) {
  if (!window.confirm("確定要刪除帳號？")) return;
  await fetchCsrfToken({ force: true });
  const csrf = getCsrfToken();
  const res = await fetch(API + `/admin/users/${userId}`, {
    method: "DELETE",
    credentials: "same-origin",
    headers: { "X-CSRF-Token": csrf || "" }
  });
  const json = await res.json().catch(() => ({}));
  if (json && json.ok) {
    loadUsers();
  } else {
    flash($("li-msg"), json.msg || "刪除失敗", false);
  }
}

async function createUserByAdmin() {
  const payload = {
    username: sanitize($("admin-add-user").value.trim()),
    password: $("admin-add-pw").value,
    nickname: $("admin-add-nickname").value.trim(),
    real_name: $("admin-add-realname").value.trim(),
    id_number: $("admin-add-idno").value.trim(),
    birthdate: $("admin-add-birthdate").value,
    phone: $("admin-add-phone").value.trim(),
    role: "user",
    status: "active"
  };
  if (!payload.username || !payload.password || !payload.nickname || !payload.real_name || !payload.id_number || !payload.birthdate || !payload.phone) {
    flash($("li-msg"), "請完整填寫新增欄位", false);
    return;
  }
  await fetchCsrfToken({ force: true });
  const csrf = getCsrfToken();
  const res = await fetch(API + "/admin/users", {
    method: "POST",
    credentials: "same-origin",
    headers: { "Content-Type": "application/json", "X-CSRF-Token": csrf || "" },
    body: JSON.stringify(payload)
  });
  const json = await res.json().catch(() => ({}));
  if (json && json.ok) {
    ["admin-add-user", "admin-add-pw", "admin-add-nickname", "admin-add-realname", "admin-add-idno", "admin-add-birthdate", "admin-add-phone"]
      .forEach((id) => { const el = $(id); if (el) el.value = ""; });
    loadUsers();
  } else {
    flash($("li-msg"), json.msg || "建立帳號失敗", false);
  }
}

window.showTab = showTab;
window.doLogin = doLogin;
window.doRegister = doRegister;
window.doLogout = doLogout;
window.loadUsers = loadUsers;
window.toggleBlock = toggleBlock;
window.removeUser = removeUser;
window.editUser = editUser;
window.createUserByAdmin = createUserByAdmin;

$("li-pw").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doLogin();
});
$("reg-pw").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doRegister();
});

(async function init() {
  startClock();
  _csrfToken = readCookie("csrf_token");
  try {
    const res = await fetch(API + "/me", { credentials: "same-origin" });
    const json = await res.json();
    if (json.ok) setAuthState(json);
  } catch (_) {}
})();

})();
</script>
</body>
</html>
