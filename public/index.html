<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html_learning — 登入系統</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f1a;
      --surface:  #1a1a2e;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --danger:   #ff4f6d;
      --text:     #e0e0f0;
      --muted:    #8888aa;
      --radius:   12px;
      --shadow:   0 8px 32px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      width: min(420px, 90vw);
      border: 1px solid rgba(255,255,255,.06);
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: .2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 1.8rem;
    }

    /* ── Tabs ─────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,.35);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: .55rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      transition: background .2s, color .2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Form ─────────────────────────────────────────────── */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    input {
      width: 100%;
      padding: .65rem .9rem;
      background: rgba(0,0,0,.3);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--accent); }

    .pw-rules {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .4rem;
      line-height: 1.5;
    }

    .pw-rules span { color: var(--accent2); }

    /* ── Button ───────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: .75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8a80ff);
      color: #fff;
    }

    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.97); }

    /* ── Message ───────────────────────────────────────────── */
    .msg {
      margin-top: .9rem;
      padding: .65rem .85rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .msg.show { display: block; }
    .msg.ok   { background: rgba(0,212,170,.18); color: var(--accent2); border: 1px solid rgba(0,212,170,.35); }
    .msg.err  { background: rgba(255,79,109,.18); color: var(--danger); border: 1px solid rgba(255,79,109,.35); }

    /* ── Success screen ───────────────────────────────────── */
    #success-screen {
      display: none;
      text-align: center;
    }

    #success-screen.show { display: block; }

    .success-icon {
      font-size: 4rem;
      margin-bottom: .5rem;
    }

    #success-screen h2 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--accent2), #7fffb2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #logout-btn {
      margin-top: 1.5rem;
      background: rgba(255,255,255,.08);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.1);
      font-size: .85rem;
    }

    #logout-btn:hover { background: rgba(255,255,255,.14); color: var(--text); }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      margin-top: 1.2rem;
      font-size: .72rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- ════════════════════ AUTH CARD ════════════════════ -->
<div class="card" id="auth-card">

  <h1>html_learning</h1>
  <p class="subtitle">簡單的帳號註冊與登入系統</p>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login"  onclick="showTab('login')">登入</button>
    <button class="tab"        id="tab-register" onclick="showTab('register')">註冊</button>
  </div>

  <!-- ── Login form ─────────────────────────────────── -->
  <div class="form-section active" id="sec-login">
    <div class="field">
      <label>帳號</label>
      <input type="text" id="li-user" placeholder="請輸入帳號" autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="li-pw" placeholder="請輸入密碼" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" onclick="doLogin()">登入</button>
    <div class="msg" id="li-msg"></div>
  </div>

  <!-- ── Register form ───────────────────────────────── -->
  <div class="form-section" id="sec-register">
    <div class="field">
      <label>帳號</label>
      <input type="text" id="reg-user" placeholder="選擇一個帳號（3 字以上）" autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="reg-pw" placeholder="請設定密碼" autocomplete="new-password" />
      <div class="pw-rules">
        密碼強度要求：<br>
        <span>✓</span> 至少 8 個字元<br>
        <span>✓</span> 包含大寫字母（A–Z）<br>
        <span>✓</span> 包含小寫字母（a–z）<br>
        <span>✓</span> 包含符號（!@#$%…）<p style="margin-top:.4rem; color:#ff4f6d" id="reg-pw-hint"></p>
      </div>
    </div>
    <button class="btn btn-primary" onclick="doRegister()">註冊</button>
    <div class="msg" id="reg-msg"></div>
  </div>

</div><!-- /auth-card -->


<!-- ════════════════════ SUCCESS SCREEN ════════════════════ -->
<div id="success-screen">
  <div class="success-icon">🎉</div>
  <h2>恭喜登入成功</h2>
  <p style="color:var(--muted); margin-top:.5rem">歡迎回來！</p>
  <button class="btn" id="logout-btn" onclick="doLogout()">登出</button>
</div>

<div class="footer">html_learning · 密碼使用 Fernet (AES) 加密儲存</div>

<!-- ════════════════════ LOGIC ════════════════════ -->
<script>
const API = "/api";

function $(id) { return document.getElementById(id); }

function showTab(tab) {
  $("sec-login").classList.toggle("active",    tab === "login");
  $("sec-register").classList.toggle("active", tab === "register");
  $("tab-login").classList.toggle("active",    tab === "login");
  $("tab-register").classList.toggle("active",tab === "register");
  clearMsg();
}

// ── Password strength checker (visual hint) ──────────────────────────────
$("reg-pw").addEventListener("input", function () {
  const v = this.value;
  const hints = [];
  if (v.length < 8)                  hints.push("至少 8 字");
  if (!/[A-Z]/.test(v))             hints.push("需大寫");
  if (!/[a-z]/.test(v))             hints.push("需小寫");
  if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(v)) hints.push("需符號");
  $("reg-pw-hint").textContent = hints.length ? "❌ " + hints.join(" · ") : "✓ 符合強度要求";
});

// ── Generic message display ────────────────────────────────────────────────
function flash(el, text, ok) {
  el.textContent = text;
  el.className = "msg show " + (ok ? "ok" : "err");
}

function clearMsg() {
  $("li-msg").className = "msg";
  $("reg-msg").className = "msg";
}

// ── Login ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const user = $("li-user").value.trim();
  const pw   = $("li-pw").value;
  if (!user || !pw) { flash($("li-msg"), "請填寫帳號與密碼", false); return; }

  const res  = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username: user, password: pw })
  });
  const json = await res.json();

  if (json.ok) {
    $("auth-card").style.display = "none";
    $("success-screen").classList.add("show");
  } else {
    flash($("li-msg"), json.msg || "登入失敗", false);
  }
}

// ── Register ──────────────────────────────────────────────────────────────
async function doRegister() {
  const user = $("reg-user").value.trim();
  const pw   = $("reg-pw").value;
  if (!user) { flash($("reg-msg"), "請填寫帳號", false); return; }
  if (user.length < 3) { flash($("reg-msg"), "帳號至少需要 3 個字元", false); return; }

  const res  = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username: user, password: pw })
  });
  const json = await res.json();

  if (json.ok) {
    flash($("reg-msg"), "✓ " + json.msg, true);
    // Switch to login tab after short delay
    setTimeout(() => { $("reg-pw").value = ""; $("reg-pw-hint").textContent = ""; }, 1500);
    setTimeout(() => showTab("login"), 2000);
  } else {
    flash($("reg-msg"), json.msg || "註冊失敗", false);
  }
}

// ── Logout ─────────────────────────────────────────────────────────────────
async function doLogout() {
  await fetch(API + "/logout", { method: "POST" });
  $("success-screen").classList.remove("show");
  $("auth-card").style.display = "";
  $("li-user").value = "";
  $("li-pw").value   = "";
  clearMsg();
}
</script>
</body>
</html>
