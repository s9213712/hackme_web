<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hackme_web — 登入系統</title>
  <!-- Security headers via HTTP (set by server/Talisman) -->
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="clock" id="clock">⏰ 載入時間中...</div>

<!-- ════════════════════ AUTH CARD ════════════════════ -->
<div class="card" id="auth-card">

  <h1>Help me improve, hack me please.</h1>
  <p class="subtitle">簡單的帳號註冊與登入系統</p>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login">登入</button>
    <button class="tab"        id="tab-register">註冊</button>
  </div>

  <!-- ── Login form ─────────────────────────────────── -->
  <div class="form-section active" id="sec-login">
    <div class="field">
      <label>帳號</label>
      <input type="text" id="li-user" placeholder="請輸入帳號" autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼</label>
      <div class="pw-wrap">
        <input type="password" id="li-pw" placeholder="請輸入密碼" autocomplete="current-password" />
        <button class="pw-toggle" id="li-pw-toggle" type="button" aria-label="顯示密碼">👁</button>
      </div>
    </div>
    <button class="btn btn-primary" id="li-btn">登入</button>
    <div class="spinner" id="li-spinner"></div>
    <div class="msg" id="li-msg"></div>
  </div>

  <!-- ── Register form ───────────────────────────────── -->
  <div class="form-section" id="sec-register">
    <div class="field">
      <label>帳號</label>
      <input type="text" id="reg-user" placeholder="選擇一個帳號（3 字以上）" autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼</label>
      <div class="pw-wrap">
        <input type="password" id="reg-pw" placeholder="請設定密碼" autocomplete="new-password" />
        <button class="pw-toggle" id="reg-pw-toggle" type="button" aria-label="顯示密碼">👁</button>
      </div>
      <div class="pw-rules">
        密碼強度要求：<br>
        <span>✓</span> 至少 8 個字元<br>
        <span>✓</span> 包含大寫字母（A–Z）<br>
        <span>✓</span> 包含小寫字母（a–z）<br>
        <span>✓</span> 包含符號（!@#$%…）<p style="margin-top:.4rem; color:#ff4f6d" id="reg-pw-hint"></p>
      </div>
    </div>
    <div class="field">
      <label>確認密碼</label>
      <div class="pw-wrap">
        <input type="password" id="reg-pw-confirm" placeholder="請再次輸入密碼" autocomplete="new-password" />
        <button class="pw-toggle" id="reg-pw-confirm-toggle" type="button" aria-label="顯示密碼">👁</button>
      </div>
      <p style="margin-top:.4rem; color:#ff4f6d" id="reg-pw-confirm-hint"></p>
    </div>
    <div class="field">
      <label>暱稱</label>
      <input type="text" id="reg-nickname" placeholder="暱稱" autocomplete="nickname" />
    </div>
    <div class="field">
      <label>真實姓名</label>
      <input type="text" id="reg-realname" placeholder="請輸入真實姓名" autocomplete="off" />
    </div>
    <div class="field">
      <label>身分證</label>
      <input type="text" id="reg-idno" placeholder="請輸入身分證" autocomplete="off" />
    </div>
    <div class="field">
      <label>生日</label>
      <input type="date" id="reg-birthdate" />
    </div>
    <div class="field">
      <label>電話</label>
      <input type="tel" id="reg-phone" placeholder="09xx-xxx-xxx" autocomplete="tel" />
    </div>
    <button class="btn btn-primary" id="reg-btn">註冊</button>
    <div class="spinner" id="reg-spinner"></div>
    <div class="msg" id="reg-msg"></div>
  </div>

</div><!-- /auth-card -->


<!-- ════════════════════ SUCCESS SCREEN ════════════════════ -->
<div id="success-screen">
  <div class="success-icon">🎉</div>
  <h2>恭喜登入成功</h2>
  <p style="color:var(--muted); margin-top:.5rem">歡迎回來！</p>
  <div class="info-grid">
    <div>使用者：<span id="me-user">-</span></div>
    <div>角色：<span id="me-role">-</span></div>
    <div>暱稱：<span id="me-nickname">-</span></div>
  </div>
  <button class="btn" id="logout-btn">登出</button>

  <div class="admin-wrap" id="admin-wrap">
    <!-- Tabs -->
    <div class="tabs" style="margin-bottom:.6rem;">
      <button class="tab active" id="tab-users">帳號管理</button>
      <button class="tab" id="tab-audit">審計日誌</button>
      <button class="tab" id="tab-violations">違規計次</button>
      <button class="tab" id="tab-settings" style="display:none;">系統設定</button>
    </div>

    <!-- ── 帳號管理 ── -->
    <div class="form-section active" id="sec-users">
      <div class="admin-tools">
        <div class="admin-toolbar" style="display:flex;gap:.5rem;align-items:center;">
          <button class="btn btn-primary" id="admin-refresh">🔄 重新整理</button>
          <span id="role-limit-info" style="font-size:.75rem;color:var(--muted);margin-left:auto;"></span>
        </div>
        <table class="user-table" id="user-table">
          <thead>
            <tr>
              <th>ID</th><th>帳號</th><th>暱稱</th><th>真實姓名</th>
              <th>角色</th><th>狀態</th><th>違規</th><th>行為</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="admin-manager-view">
        <div class="mini-title" style="margin-top:.8rem;">➕ 新增帳號（最高管理者）</div>
        <form id="admin-add-form">
          <div class="field"><label>帳號</label><input type="text" id="admin-add-user" placeholder="a-z 0-9 _ -" /></div>
          <div class="field">
            <label>密碼</label>
            <div class="pw-wrap">
              <input type="password" id="admin-add-pw" placeholder="至少 8 字元" />
              <button class="pw-toggle" id="admin-add-pw-toggle" type="button" aria-label="顯示密碼">👁</button>
            </div>
          </div>
          <div class="field">
            <label>確認密碼</label>
            <div class="pw-wrap">
              <input type="password" id="admin-add-pw-confirm" placeholder="請再次輸入密碼" />
              <button class="pw-toggle" id="admin-add-pw-confirm-toggle" type="button" aria-label="顯示密碼">👁</button>
            </div>
            <p style="margin-top:.4rem; color:#ff4f6d" id="admin-add-pw-confirm-hint"></p>
          </div>
          <div class="field"><label>暱稱</label><input type="text" id="admin-add-nickname" placeholder="暱稱" /></div>
          <div class="field"><label>真實姓名</label><input type="text" id="admin-add-realname" placeholder="真實姓名" /></div>
          <div class="field"><label>身分證</label><input type="text" id="admin-add-idno" placeholder="身分證" /></div>
          <div class="field"><label>生日</label><input type="date" id="admin-add-birthdate" /></div>
          <div class="field"><label>電話</label><input type="tel" id="admin-add-phone" placeholder="09xx-xxx-xxx" /></div>
          <div class="admin-toolbar">
            <button class="btn btn-primary" type="button" id="admin-add-btn">建立帳號</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── 審計日誌 ── -->
    <div class="form-section" id="sec-audit">
      <div class="admin-toolbar" style="display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;">
        <button class="btn btn-primary" id="audit-refresh">🔄 重新整理</button>
        <span style="font-size:.75rem;color:var(--muted);">共 <span id="audit-total">0</span> 筆</span>
        <span id="audit-integrity" style="margin-left:.5rem;font-size:.72rem;"></span>
        <button class="btn" id="audit-prev" style="margin-left:auto;">← 上一頁</button>
        <button class="btn" id="audit-next">下一頁 →</button>
      </div>
      <div id="audit-entries" style="max-height:420px;overflow-y:auto;font-size:.72rem;font-family:monospace;"></div>
    </div>

    <!-- ── 違規計次 ── -->
    <div class="form-section" id="sec-violations">
      <div class="admin-toolbar" style="display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;">
        <button class="btn btn-primary" id="violations-refresh">🔄 重新整理</button>
        <span style="font-size:.75rem;color:var(--muted);">共 <span id="violations-total">0</span> 筆</span>
        <span id="violations-integrity" style="margin-left:.5rem;font-size:.72rem;"></span>
        <button class="btn" id="violations-prev" style="margin-left:auto;">← 上一頁</button>
        <button class="btn" id="violations-next">下一頁 →</button>
      </div>
      <div id="violation-users" style="max-height:180px;overflow-y:auto;margin-bottom:.6rem;"></div>
      <div id="violation-entries" style="max-height:320px;overflow-y:auto;font-size:.72rem;font-family:monospace;"></div>
    </div>

    <!-- ── 系統設定（super_admin only） ── -->
    <div class="form-section" id="sec-settings">
      <div class="mini-title">⚙️ 系統參數</div>
      <form id="settings-form" style="margin-top:.6rem;">
        <div class="field">
          <label><input type="checkbox" id="s-allow-register" /> 允許一般用戶註冊</label>
        </div>
        <div class="field">
          <label><input type="checkbox" id="s-require-email" /> 需 email 驗證</label>
        </div>
        <div class="field">
          <label>登入失敗鎖定次數</label>
          <input type="number" id="s-max-fail" min="1" max="20" />
        </div>
        <div class="field">
          <label>封鎖時長（分鐘）</label>
          <input type="number" id="s-block-dur" min="1" max="1440" />
        </div>
        <div class="field">
          <label>Session 有效期（小時）</label>
          <input type="number" id="s-session-ttl" min="1" max="72" />
        </div>
        <div class="admin-toolbar" style="margin-top:.6rem;">
          <button class="btn btn-primary" type="button" id="settings-save-btn">💾 儲存設定</button>
        </div>
        <div id="settings-msg" style="margin-top:.5rem;font-size:.8rem;"></div>
      </form>
      <div class="mini-title" style="margin-top:1.2rem;color:#ff4f6d;">☠️ 危險區</div>
      <div class="admin-toolbar" style="margin-top:.5rem;">
        <button class="btn" id="restart-server-btn" style="background:#ff4f6d;color:#fff;border-color:#ff4f6d;">
          🔁 重啟服務器
        </button>
        <span style="font-size:.72rem;color:var(--muted);margin-left:.4rem;">（超級管理者專屬）</span>
      </div>
    </div>
  </div>
</div>

<div class="footer">hackme_web · 密碼使用 Argon2id 雜湊儲存</div>

<script src="/app.js" defer></script>
</body>
</html>
