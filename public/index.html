<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>html_learning — 登入系統</title>
  <!-- Content Security Policy — strict, no inline scripts -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f1a;
      --surface:  #1a1a2e;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --danger:   #ff4f6d;
      --text:     #e0e0f0;
      --muted:    #8888aa;
      --radius:   12px;
      --shadow:   0 8px 32px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      width: min(420px, 90vw);
      border: 1px solid rgba(255,255,255,.06);
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: .2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 1.8rem;
    }

    /* ── Tabs ─────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,.35);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: .55rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      transition: background .2s, color .2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Form ─────────────────────────────────────────────── */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    input {
      width: 100%;
      padding: .65rem .9rem;
      background: rgba(0,0,0,.3);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--accent); }

    /* ── Password field with toggle ──────────────────────── */
    .pw-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .pw-wrap input {
      padding-right: 2.8rem;
    }

    .pw-toggle {
      position: absolute;
      right: .6rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: .2rem;
      color: var(--muted);
      transition: color .2s;
      user-select: none;
      line-height: 1;
    }

    .pw-toggle:hover { color: var(--accent); }

    .pw-rules {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .4rem;
      line-height: 1.5;
    }

    .pw-rules span { color: var(--accent2); }

    /* ── Button ───────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: .75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8a80ff);
      color: #fff;
    }

    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.97); }

    /* ── Message ───────────────────────────────────────────── */
    .msg {
      margin-top: .9rem;
      padding: .65rem .85rem;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .msg.show { display: block; }
    .msg.ok   { background: rgba(0,212,170,.18); color: var(--accent2); border: 1px solid rgba(0,212,170,.35); }
    .msg.err  { background: rgba(255,79,109,.18); color: var(--danger); border: 1px solid rgba(255,79,109,.35); }

    /* ── Success screen ───────────────────────────────────── */
    #success-screen {
      display: none;
      text-align: center;
    }

    #success-screen.show { display: block; }

    .success-icon {
      font-size: 4rem;
      margin-bottom: .5rem;
    }

    #success-screen h2 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--accent2), #7fffb2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #logout-btn {
      margin-top: 1.5rem;
      background: rgba(255,255,255,.08);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.1);
      font-size: .85rem;
    }

    #logout-btn:hover { background: rgba(255,255,255,.14); color: var(--text); }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      margin-top: 1.2rem;
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── Spinner ──────────────────────────────────────────── */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: .6rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading { opacity: .7; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ════════════════════ AUTH CARD ════════════════════ -->
<div class="card" id="auth-card">

  <h1>html_learning</h1>
  <p class="subtitle">簡單的帳號註冊與登入系統</p>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login"  onclick="showTab('login')">登入</button>
    <button class="tab"        id="tab-register" onclick="showTab('register')">註冊</button>
  </div>

  <!-- ── Login form ─────────────────────────────────── -->
  <div class="form-section active" id="sec-login">
    <div class="field">
      <label>帳號</label>
      <input type="text" id="li-user" placeholder="請輸入帳號" autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼</label>
      <div class="pw-wrap">
        <input type="password" id="li-pw" placeholder="請輸入密碼" autocomplete="current-password" />
        <button class="pw-toggle" id="li-pw-toggle" type="button" aria-label="顯示密碼">👁</button>
      </div>
    </div>
    <button class="btn btn-primary" id="li-btn" onclick="doLogin()">登入</button>
    <div class="spinner" id="li-spinner"></div>
    <div class="msg" id="li-msg"></div>
  </div>

  <!-- ── Register form ───────────────────────────────── -->
  <div class="form-section" id="sec-register">
    <div class="field">
      <label>帳號</label>
      <input type="text" id="reg-user" placeholder="選擇一個帳號（3 字以上）" autocomplete="username" />
    </div>
    <div class="field">
      <label>密碼</label>
      <div class="pw-wrap">
        <input type="password" id="reg-pw" placeholder="請設定密碼" autocomplete="new-password" />
        <button class="pw-toggle" id="reg-pw-toggle" type="button" aria-label="顯示密碼">👁</button>
      </div>
      <div class="pw-rules">
        密碼強度要求：<br>
        <span>✓</span> 至少 8 個字元<br>
        <span>✓</span> 包含大寫字母（A–Z）<br>
        <span>✓</span> 包含小寫字母（a–z）<br>
        <span>✓</span> 包含符號（!@#$%…）<p style="margin-top:.4rem; color:#ff4f6d" id="reg-pw-hint"></p>
      </div>
    </div>
    <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">註冊</button>
    <div class="spinner" id="reg-spinner"></div>
    <div class="msg" id="reg-msg"></div>
  </div>

</div><!-- /auth-card -->


<!-- ════════════════════ SUCCESS SCREEN ════════════════════ -->
<div id="success-screen">
  <div class="success-icon">🎉</div>
  <h2>恭喜登入成功</h2>
  <p style="color:var(--muted); margin-top:.5rem">歡迎回來！</p>
  <button class="btn" id="logout-btn" onclick="doLogout()">登出</button>
</div>

<div class="footer">html_learning · 密碼使用 Argon2id 雜湊儲存</div>

<!-- ════════════════════ LOGIC ════════════════════ -->
<script>
(function() {
'use strict';

const API = "/api";

// ── Sanitization (XSS defense — defense in depth, CSP is primary) ─────────────
function sanitize(str) {
  if (typeof str !== 'string') return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;')
    .replace(/\//g, '&#x2F;');
}

// ── CSRF token management ─────────────────────────────────────────────────────
let _csrfToken = null;

async function fetchCsrfToken() {
  try {
    const res = await fetch(API + '/csrf-token', { credentials: 'same-origin' });
    const json = await res.json();
    if (json.ok) _csrfToken = json.csrf_token;
  } catch (_) { _csrfToken = null; }
}

function getCsrfToken() { return _csrfToken; }

// ── DOM helpers ───────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showTab(tab) {
  $("sec-login").classList.toggle("active",    tab === "login");
  $("sec-register").classList.toggle("active", tab === "register");
  $("tab-login").classList.toggle("active",    tab === "login");
  $("tab-register").classList.toggle("active",tab === "register");
  clearMsg();
}

// ── Password visibility toggle ─────────────────────────────────────────────
function setupPwToggle(inputId, btnId) {
  const input = $(inputId);
  const btn   = $(btnId);
  if (!input || !btn) return;

  btn.addEventListener("mousedown", () => {
    input.type = "text";
    btn.textContent = "🙈";
  });
  btn.addEventListener("mouseup", () => {
    input.type = "password";
    btn.textContent = "👁";
  });
  btn.addEventListener("mouseleave", () => {
    input.type = "password";
    btn.textContent = "👁";
  });
  btn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    input.type = "text";
    btn.textContent = "🙈";
  }, { passive: false });
  btn.addEventListener("touchend", (e) => {
    e.preventDefault();
    input.type = "password";
    btn.textContent = "👁";
  }, { passive: false });
}

setupPwToggle("li-pw", "li-pw-toggle");
setupPwToggle("reg-pw", "reg-pw-toggle");

// ── Password strength checker ──────────────────────────────────────────────
$("reg-pw").addEventListener("input", function () {
  const v = this.value;
  const hints = [];
  if (v.length < 8)                  hints.push("至少 8 字");
  if (!/[A-Z]/.test(v))             hints.push("需大寫");
  if (!/[a-z]/.test(v))             hints.push("需小寫");
  if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(v)) hints.push("需符號");
  $("reg-pw-hint").textContent = hints.length ? "❌ " + hints.join(" · ") : "✓ 符合強度要求";
});

// ── Message display ────────────────────────────────────────────────────────────
function flash(el, text, ok) {
  el.textContent = text;
  el.className = "msg show " + (ok ? "ok" : "err");
}

function clearMsg() {
  $("li-msg").className = "msg";
  $("reg-msg").className = "msg";
}

// ── Loading state ─────────────────────────────────────────────────────────────
function setLoading(btnId, spinnerId, on) {
  const btn = $(btnId);
  const sp  = $(spinnerId);
  if (!btn || !sp) return;
  btn.classList.toggle("loading", on);
  sp.style.display = on ? "block" : "none";
}

// ── Login ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const user = sanitize($("li-user").value.trim());
  const pw   = $("li-pw").value;
  if (!user || !pw) { flash($("li-msg"), "請填寫帳號與密碼", false); return; }

  // Ensure CSRF token is fresh before every login
  await fetchCsrfToken();
  const csrf = getCsrfToken();

  setLoading("li-btn", "li-spinner", true);
  clearMsg();

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRF-Token": csrf || ""
      },
      body: JSON.stringify({ username: user, password: pw, csrf_token: csrf })
    });
    const json = await res.json();

    if (json.ok) {
      // Refresh CSRF token on successful login for subsequent actions
      _csrfToken = null;
      $("auth-card").style.display = "none";
      $("success-screen").classList.add("show");
    } else {
      // Re-fetch CSRF token on failure (server may have rotated it)
      _csrfToken = null;
      flash($("li-msg"), json.msg || "登入失敗", false);
    }
  } catch (e) {
    flash($("li-msg"), "網路錯誤，請稍後再試", false);
  } finally {
    setLoading("li-btn", "li-spinner", false);
  }
}

// ── Register ─────────────────────────────────────────────────────────────────
async function doRegister() {
  const user = sanitize($("reg-user").value.trim());
  const pw   = $("reg-pw").value;
  if (!user) { flash($("reg-msg"), "請填寫帳號", false); return; }
  if (user.length < 3) { flash($("reg-msg"), "帳號至少需要 3 個字元", false); return; }
  // Username charset enforced server-side, but enforce client-side too
  if (!/^[a-zA-Z0-9_\-]+$/.test(user)) {
    flash($("reg-msg"), "帳號只能包含英文、數字、底線、減號", false);
    return;
  }

  await fetchCsrfToken();
  const csrf = getCsrfToken();

  setLoading("reg-btn", "reg-spinner", true);
  clearMsg();

  try {
    const res = await fetch(API + "/register", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRF-Token": csrf || ""
      },
      body: JSON.stringify({ username: user, password: pw, csrf_token: csrf })
    });
    const json = await res.json();

    if (json.ok) {
      _csrfToken = null;
      flash($("reg-msg"), "✓ " + sanitize(json.msg), true);
      setTimeout(() => { $("reg-pw").value = ""; $("reg-pw-hint").textContent = ""; }, 1500);
      setTimeout(() => showTab("login"), 2000);
    } else {
      _csrfToken = null;
      flash($("reg-msg"), json.msg || "註冊失敗", false);
    }
  } catch (e) {
    flash($("reg-msg"), "網路錯誤，請稍後再試", false);
  } finally {
    setLoading("reg-btn", "reg-spinner", false);
  }
}

// ── Logout ─────────────────────────────────────────────────────────────────────
async function doLogout() {
  try {
    await fetch(API + "/logout", {
      method: "POST",
      credentials: "same-origin",
      headers: { "X-CSRF-Token": getCsrfToken() || "" }
    });
  } catch (_) {}
  _csrfToken = null;
  $("success-screen").classList.remove("show");
  $("auth-card").style.display = "";
  $("li-user").value = "";
  $("li-pw").value   = "";
  clearMsg();
}

// ── Enter key support ─────────────────────────────────────────────────────────
$("li-pw").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doLogin();
});
$("reg-pw").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doRegister();
});

// ── Boot: check if already logged in ─────────────────────────────────────────
(async function init() {
  try {
    const res = await fetch(API + "/me", { credentials: "same-origin" });
    const json = await res.json();
    if (json.ok) {
      $("auth-card").style.display = "none";
      $("success-screen").classList.add("show");
    }
  } catch (_) {}
})();

})();
</script>
</body>
</html>
