<!doctype html>
<html lang="zh-Hant" data-i18n-title="tradingWorkflow.title">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Workflow Editor</title>
  <link rel="stylesheet" href="/i18n-language-switcher.css?v=20260516-i18n-v1" />
  <link rel="stylesheet" href="/trading-workflow-editor.css?v=20260506-workflow-preview" />
</head>
<body class="standalone-editor-page">
  <div class="editor-bg-grid" aria-hidden="true"></div>
  <header class="topbar">
    <div>
      <h1>Trading Workflow Editor</h1>
      <div class="subtitle">建立可回測、可執行的節點式交易策略；儲存後回交易頁載入。</div>
    </div>
    <div class="top-actions">
      <div class="global-language-switcher global-language-switcher-inline" id="global-language-switcher">
        <label for="app-language-select" data-i18n="language.label">語言</label>
        <select id="app-language-select" data-language-select aria-label="語言">
          <option value="zh-TW">繁體中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <button class="primary" id="saveBtn" type="button">儲存</button>
      <button class="good" id="copyBtn" type="button">複製 JSON</button>
      <details class="top-action-menu">
        <summary>更多操作</summary>
        <div class="top-action-menu-body">
          <button id="templateBtn" type="button">載入範例</button>
          <button id="importBtn" type="button">套用 JSON</button>
        </div>
      </details>
    </div>
  </header>

  <main class="editor-shell">
    <aside class="palette">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">節點工具箱</div>
        </div>
        <div class="panel-body">
          <details class="tool-group" open>
            <summary class="tool-title">Graph 節點 <span class="tool-count">3</span></summary>
            <div class="tool-grid">
              <button data-add="logic" data-add-node="logic:AND" type="button"><b>AND 節點</b><span>多個 input 全部成立才走 TRUE</span></button>
              <button data-add="logic" data-add-node="logic:OR" type="button"><b>OR 節點</b><span>任一 input 成立就走 TRUE</span></button>
              <button data-add="logic" data-add-node="logic:NOT" type="button"><b>NOT 節點</b><span>反向條件，可做排除規則</span></button>
            </div>
          </details>
          <details class="tool-group" open>
            <summary class="tool-title">條件節點 <span class="tool-count">8</span></summary>
            <div class="tool-grid">
              <button data-add="condition" data-add-node="condition:price_below" type="button"><b>價格低於</b><span>price <= 指定價格</span></button>
              <button data-add="condition" data-add-node="condition:price_above" type="button"><b>價格高於</b><span>price >= 指定價格</span></button>
              <button data-add="condition" data-add-node="condition:rsi_below" type="button"><b>RSI 低於</b><span>超賣或回檔條件</span></button>
              <button data-add="condition" data-add-node="condition:rsi_above" type="button"><b>RSI 高於</b><span>強勢或過熱條件</span></button>
              <button data-add="condition" data-add-node="condition:kd_above" type="button"><b>KD 高於</b><span>動能確認</span></button>
              <button data-add="condition" data-add-node="condition:ma_position" type="button"><b>均線位置</b><span>價格在 MA 上下方</span></button>
              <button data-add="condition" data-add-node="condition:bb_position" type="button"><b>布林位置</b><span>中線、上軌、下軌</span></button>
              <button data-add="condition" data-add-node="condition:has_position" type="button"><b>持倉狀態</b><span>有倉位或無倉位</span></button>
            </div>
          </details>
          <details class="tool-group">
            <summary class="tool-title">行為節點 <span class="tool-count">5</span></summary>
            <div class="tool-grid">
              <button data-add="action" data-add-node="action:buy_percent" type="button"><b>買入百分比</b><span>使用可用資金的一部分</span></button>
              <button data-add="action" data-add-node="action:buy_amount" type="button"><b>固定金額買入</b><span>使用指定點數</span></button>
              <button data-add="action" data-add-node="action:sell_percent" type="button"><b>賣出百分比</b><span>賣出持倉的一部分</span></button>
              <button data-add="action" data-add-node="action:close_all" type="button"><b>全部平倉</b><span>風險優先的緊急動作</span></button>
              <button data-add="action" data-add-node="action:hold" type="button"><b>不動作</b><span>條件成立但只記錄掃描</span></button>
            </div>
          </details>
          <details class="tool-group">
            <summary class="tool-title">控制節點 <span class="tool-count">1</span></summary>
            <div class="tool-grid">
              <button data-add="control" data-add-node="control:cooldown" type="button"><b>冷卻 / 次數</b><span>設定每 X 秒、最大執行次數</span></button>
            </div>
          </details>
        </div>
      </div>
    </aside>

    <section class="workspace">
      <div class="strategy-bar panel">
        <div class="panel-body">
          <label class="field">策略名稱
            <input id="strategyName" maxlength="80" placeholder="例如：BTC MA 回踩分批策略">
          </label>
        </div>
        <div class="panel-body">
          <label class="field">策略說明
            <input id="strategyDescription" maxlength="160" placeholder="簡短描述用途、週期與風控">
          </label>
        </div>
        <div class="panel-body">
          <div class="badges" id="summaryBadges"></div>
        </div>
      </div>
      <div class="branch-tabs" id="branchTabs"></div>
      <div id="canvas"></div>
    </section>

    <aside class="inspector">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">設定面板</div>
          <span class="badge" id="selectedBadge">未選取</span>
        </div>
        <div class="panel-body" id="inspector"></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">策略檢查</div>
          <span class="badge" id="validationBadge">-</span>
        </div>
        <div class="panel-body">
          <ul class="validation-list" id="validationList"></ul>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">回測預覽</div>
          <span class="badge" id="workflowPreviewBadge">未執行</span>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>市場</label>
            <select id="workflow-preview-market"></select>
          </div>
          <div class="three-col">
            <div class="field">
              <label>週期</label>
              <select id="workflow-preview-timeframe">
                <option value="15m">15m</option>
                <option value="1h" selected>1h</option>
                <option value="4h">4h</option>
                <option value="1d">1d</option>
              </select>
            </div>
            <div class="field">
              <label>初始資金</label>
              <input id="workflow-preview-initial-cash" type="number" min="1" step="1" value="10000" />
            </div>
            <div class="field">
              <label>滑價 %</label>
              <input id="workflow-preview-slippage" type="number" min="0" step="0.01" value="0" />
            </div>
          </div>
          <div class="two-col">
            <div class="field">
              <label>開始時間</label>
              <input id="workflow-preview-start" type="datetime-local" />
            </div>
            <div class="field">
              <label>結束時間</label>
              <input id="workflow-preview-end" type="datetime-local" />
            </div>
          </div>
          <div class="preview-actions">
            <button class="primary" id="workflow-preview-run-btn" type="button">執行回測預覽</button>
            <button id="workflow-preview-range-180d" type="button">最近 180 天</button>
            <button id="workflow-preview-range-365d" type="button">最近 365 天</button>
          </div>
          <div class="status" id="workflow-preview-status"></div>
          <div class="preview-metrics" id="workflow-preview-metrics"></div>
          <div class="preview-detail" id="workflow-preview-detail"></div>
          <div class="preview-warnings" id="workflow-preview-warnings"></div>
        </div>
      </div>
      <div class="panel json-panel">
        <div class="panel-body">
          <details>
            <summary>可讀 JSON</summary>
            <textarea id="jsonOut" spellcheck="false"></textarea>
          </details>
          <div class="status" id="status"></div>
        </div>
      </div>
    </aside>
  </main>

  <script src="/js/05-i18n.js?v=20260516-i18n-v1"></script>
  <script src="/js/trading-workflow-editor.js?v=20260506-workflow-preview"></script>
</body>
</html>
