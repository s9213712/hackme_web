name: ci

on:
  push:
    branches: [main, 03.Points]
  pull_request:

jobs:
  smoke-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install gitleaks
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks "$HOME/bin/gitleaks"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Run pre-push quality gate
        run: python scripts/prepush/pre_push_checks.py --ci
