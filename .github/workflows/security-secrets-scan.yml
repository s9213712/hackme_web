name: security-secrets-scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gitleaks
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks "$HOME/bin/gitleaks"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Prepare report directory
        run: mkdir -p security/reports

      - name: Run gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect \
            --source "$GITHUB_WORKSPACE" \
            --no-git \
            --redact \
            --verbose \
            --config "$GITHUB_WORKSPACE/.gitleaks.toml" \
            --report-format json \
            --report-path security/reports/gitleaks_report.json

      - name: Run plaintext secrets scan
        id: plaintext
        continue-on-error: true
        run: |
          python scripts/security/scan_plaintext_secrets.py \
            --fail-on high \
            --report-json security/reports/secrets_scan_report.json \
            --report-md security/reports/secrets_scan_report.md

      - name: Upload secrets scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-scan-reports
          path: security/reports/
          if-no-files-found: warn

      - name: Fail on high risk findings
        if: steps.gitleaks.outcome != 'success' || steps.plaintext.outcome != 'success'
        run: |
          echo "Secrets scan failed. Download the secrets-scan-reports artifact for masked evidence."
          exit 1
