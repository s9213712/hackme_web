name: playwright-qa

on:
  pull_request:
  push:
    branches: [main, 03.Points, 03b.Comfyui, 04.BLOCKCHAIN, 04.BLOCKCHAIN_RC1]
  workflow_dispatch:
    inputs:
      run_deep_playwright:
        description: Run the full deep Playwright site flow
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "0"
  schedule:
    - cron: "30 18 * * *"

jobs:
  playwright-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Playwright acceptance checks
        env:
          RUN_DEEP_PLAYWRIGHT: ${{ github.event_name == 'schedule' && '1' || github.event.inputs.run_deep_playwright || '0' }}
          PLAYWRIGHT_ACCEPTANCE_RETRIES: "2"
          KEEP_PLAYWRIGHT_RUNTIME: "1"
          PLAYWRIGHT_RUNTIME_BASE: ${{ runner.temp }}/hackme_web_playwright_acceptance
        run: bash scripts/testing/run_playwright_acceptance.sh

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-qa-runtime-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/hackme_web_playwright_acceptance*/**/reports/**
            ${{ runner.temp }}/hackme_web_playwright_acceptance*/**/*.log
            ${{ runner.temp }}/hackme_web_playwright_acceptance*/**/*.out
          if-no-files-found: ignore
