title = "hackme_web gitleaks config"

[allowlist]
description = "Exclude runtime/generated paths; fake fixture values are governed by security/secrets_allowlist.yml."
paths = [
  '''^\.git/''',
  '''^\.venv/''',
  '''^venv/''',
  '''^node_modules/''',
  '''^vendor/''',
  '''^dist/''',
  '''^build/''',
  '''^coverage/''',
  '''^__pycache__/''',
  '''/__pycache__/''',
  '''^runtime/database/.*\.(db|sqlite|sqlite3)$''',
  '''^runtime/storage/''',
  '''^uploads/''',
  '''^snapshots/''',
  '''^security/reports/''',
  '''^runtime/reports/''',
  '''^runtime/logs/.*\.log$''',
  '''^runtime/anchors/.*\.(json|jsonl)$''',
  '''^runtime/chats/.*\.jsonl$''',
  '''^docs/games/evidence/stockfish_teacher/.*/_runtime/''',
  '''^runtime/cert\.pem$''',
  '''^runtime/key\.pem$''',
  '''^runtime/\.chain_seed$''',
  '''^runtime/\.csrfkey$''',
  '''^runtime/\.fkey$''',
  '''^runtime/\.integrity_key$''',
]
